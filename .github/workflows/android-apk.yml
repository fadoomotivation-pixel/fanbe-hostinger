name: Build Android APK

# When to run:
#   • Every push to main (so the latest APK is always one click away)
#   • Every PR (so reviewers can install the proposed build on a phone)
#   • Manually via the Actions tab → "Run workflow"
#
# Output: a debug-signed .apk uploaded as a workflow artifact named
# `fanbe-crm-debug-apk`. Download from the Actions run page →
# Artifacts section. Side-load on any Android phone after enabling
# "Install unknown apps" for the browser / file manager.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21 (Android Gradle Plugin 8.x requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install npm deps
        run: npm install

      - name: Build web app (Vite → dist/)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mfgjzkaabyltscgrkhdz.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mZ2p6a2FhYnlsdHNjZ3JraGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDAzNjQsImV4cCI6MjA4NjkxNjM2NH0.V6uWBH72rgp0UEFdB9aT8qrG4YFYhnERWZO1t976_tM' }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Capacitor sync (copies dist/ + native config into android/)
        run: npx cap sync android

      - name: Gradle assembleDebug (build .apk)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate built APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at: $APK_PATH"
          ls -lah "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fanbe-crm-debug-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
